<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1824;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e05010;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f3701e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <ellipse cx="200" cy="160" rx="180" ry="160" fill="url(#glowGrad)"/>

  <!-- Decorative dots pattern -->
  <g fill="#f3701e" opacity="0.08">
    <circle cx="50" cy="50" r="3"/><circle cx="90" cy="50" r="3"/><circle cx="130" cy="50" r="3"/>
    <circle cx="50" cy="90" r="3"/><circle cx="90" cy="90" r="3"/><circle cx="130" cy="90" r="3"/>
    <circle cx="270" cy="50" r="3"/><circle cx="310" cy="50" r="3"/><circle cx="350" cy="50" r="3"/>
    <circle cx="270" cy="90" r="3"/><circle cx="310" cy="90" r="3"/><circle cx="350" cy="90" r="3"/>
  </g>

  <!-- Decorative corner brackets -->
  <g fill="none" stroke="#f3701e" stroke-width="2" opacity="0.5">
    <polyline points="20,40 20,20 40,20"/>
    <polyline points="360,40 360,20 380,20"/>
    <polyline points="20,360 20,380 40,380"/>
    <polyline points="360,360 360,380 380,380"/>
  </g>

  <!-- Color palette swatches decorative -->
  <circle cx="55" cy="340" r="14" fill="#f3701e" opacity="0.7"/>
  <circle cx="85" cy="340" r="14" fill="#4a90d9" opacity="0.7"/>
  <circle cx="115" cy="340" r="14" fill="#f0ece8" opacity="0.4"/>

  <!-- Body base -->
  <ellipse cx="200" cy="380" rx="130" ry="50" fill="#12101a"/>

  <!-- Torso with blouse/creative outfit -->
  <path d="M118 295 Q128 242 200 232 Q272 242 282 295 L290 370 L110 370 Z" fill="#1e1c2a"/>
  <!-- Neckline V detail -->
  <path d="M172 252 L200 280 L228 252" fill="none" stroke="#2d2b3a" stroke-width="5"/>

  <!-- Neck -->
  <rect x="184" y="208" width="32" height="30" rx="8" fill="#d4a882"/>

  <!-- Head -->
  <ellipse cx="200" cy="183" rx="60" ry="68" fill="#d4a882"/>

  <!-- Long hair flowing to shoulders -->
  <path d="M140 175 Q138 110 200 108 Q262 110 260 175" fill="#1a0e00"/>
  <path d="M140 175 Q132 230 136 280 Q148 268 158 250 Q145 210 140 175Z" fill="#1a0e00"/>
  <path d="M260 175 Q268 230 264 280 Q252 268 242 250 Q255 210 260 175Z" fill="#1a0e00"/>
  <!-- Hair highlight -->
  <path d="M180 115 Q200 108 215 120" fill="none" stroke="#3a2010" stroke-width="4" opacity="0.6"/>

  <!-- Eyes (slightly larger, expressive) -->
  <ellipse cx="178" cy="181" rx="10" ry="11" fill="#1a1612"/>
  <ellipse cx="222" cy="181" rx="10" ry="11" fill="#1a1612"/>
  <circle cx="182" cy="178" r="3.5" fill="#fff" opacity="0.65"/>
  <circle cx="226" cy="178" r="3.5" fill="#fff" opacity="0.65"/>

  <!-- Eyelashes (top) -->
  <path d="M168 172 Q178 167 191 172" fill="none" stroke="#1a0e00" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 172 Q222 167 234 172" fill="none" stroke="#1a0e00" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M197 192 Q200 206 203 192" fill="none" stroke="#b07850" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M185 211 Q200 224 215 211" fill="none" stroke="#9a6040" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Earring left -->
  <circle cx="140" cy="190" r="4" fill="#f3701e" opacity="0.9"/>
  <line x1="140" y1="194" x2="140" y2="204" stroke="#f3701e" stroke-width="2" opacity="0.7"/>

  <!-- Earring right -->
  <circle cx="260" cy="190" r="4" fill="#f3701e" opacity="0.9"/>
  <line x1="260" y1="194" x2="260" y2="204" stroke="#f3701e" stroke-width="2" opacity="0.7"/>

  <!-- Design pen/brush tool icon badge -->
  <rect x="152" y="304" width="96" height="36" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <!-- Pen nib icon -->
  <polygon points="174,322 184,310 194,322 184,328" fill="rgba(255,255,255,0.9)"/>
  <line x1="184" y1="328" x2="184" y2="334" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
  <text x="220" y="327" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">UI/UX</text>

  <!-- Label tag at top -->
  <rect x="148" y="22" width="104" height="24" rx="12" fill="rgba(243,112,30,0.12)" stroke="#f3701e" stroke-width="1" opacity="0.7"/>
  <text x="200" y="38" text-anchor="middle" font-family="monospace" font-size="10" fill="#f3701e" letter-spacing="1">DESIGNER</text>
</svg>
