<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1824;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e05010;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:0.16" />
      <stop offset="100%" style="stop-color:#f3701e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <ellipse cx="200" cy="160" rx="180" ry="160" fill="url(#glowGrad)"/>

  <!-- Bar chart decorative (data aesthetic) -->
  <g opacity="0.07" fill="#f3701e">
    <rect x="30" y="310" width="16" height="60"/>
    <rect x="52" y="290" width="16" height="80"/>
    <rect x="74" y="330" width="16" height="40"/>
    <rect x="330" y="295" width="16" height="75"/>
    <rect x="352" y="315" width="16" height="55"/>
    <rect x="308" y="325" width="16" height="45"/>
  </g>
  <!-- Line chart decorative -->
  <polyline points="30,240 70,200 120,220 170,180 220,160 270,190 320,150 370,170" fill="none" stroke="#f3701e" stroke-width="1" opacity="0.07"/>

  <!-- Decorative corner brackets -->
  <g fill="none" stroke="#f3701e" stroke-width="2" opacity="0.5">
    <polyline points="20,40 20,20 40,20"/>
    <polyline points="360,40 360,20 380,20"/>
    <polyline points="20,360 20,380 40,380"/>
    <polyline points="360,360 360,380 380,380"/>
  </g>

  <!-- Body base -->
  <ellipse cx="200" cy="380" rx="130" ry="50" fill="#12101a"/>

  <!-- Torso - casual shirt/button-up -->
  <path d="M120 292 Q130 242 200 232 Q270 242 280 292 L290 370 L110 370 Z" fill="#1e1c2a"/>
  <!-- Collar detail -->
  <path d="M175 250 L200 275 L225 250 L210 242 L200 258 L190 242Z" fill="#252334"/>
  <!-- Button line -->
  <circle cx="200" cy="290" r="3" fill="#2e2c3e"/>
  <circle cx="200" cy="310" r="3" fill="#2e2c3e"/>
  <circle cx="200" cy="330" r="3" fill="#2e2c3e"/>

  <!-- Neck -->
  <rect x="184" y="210" width="32" height="30" rx="8" fill="#c09878"/>

  <!-- Head -->
  <ellipse cx="200" cy="185" rx="60" ry="66" fill="#c09878"/>

  <!-- Hair (short, neat, slightly wavy) -->
  <path d="M142 172 Q144 115 200 113 Q256 115 258 172 Q250 135 200 132 Q150 135 142 172Z" fill="#0a0600"/>
  <path d="M142 172 Q136 150 140 132 Q146 135 142 172Z" fill="#0a0600"/>
  <path d="M258 172 Q264 150 260 132 Q254 135 258 172Z" fill="#0a0600"/>

  <!-- Glasses -->
  <g fill="none" stroke="#4a8ac4" stroke-width="2.5" opacity="0.9">
    <rect x="161" y="172" width="34" height="24" rx="8"/>
    <rect x="205" y="172" width="34" height="24" rx="8"/>
    <line x1="195" y1="184" x2="205" y2="184"/>
    <line x1="142" y1="182" x2="161" y2="182"/>
    <line x1="239" y1="182" x2="258" y2="182"/>
  </g>

  <!-- Eyes (behind glasses) -->
  <ellipse cx="178" cy="184" rx="9" ry="9" fill="#1a1612"/>
  <ellipse cx="222" cy="184" rx="9" ry="9" fill="#1a1612"/>
  <circle cx="181" cy="181" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="225" cy="181" r="3" fill="#fff" opacity="0.6"/>

  <!-- Eyebrows (visible above glasses) -->
  <path d="M163 168 Q178 163 192 168" fill="none" stroke="#0a0600" stroke-width="3" stroke-linecap="round"/>
  <path d="M208 168 Q222 163 237 168" fill="none" stroke="#0a0600" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M197 195 Q200 207 203 195" fill="none" stroke="#9a7050" stroke-width="2" stroke-linecap="round"/>

  <!-- Neutral / slight smile -->
  <path d="M186 213 Q200 222 214 213" fill="none" stroke="#805030" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Data analyst icon badge -->
  <rect x="148" y="304" width="104" height="36" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <!-- Mini bar chart inside badge -->
  <rect x="162" y="325" width="6" height="9" fill="rgba(255,255,255,0.9)"/>
  <rect x="171" y="318" width="6" height="16" fill="rgba(255,255,255,0.9)"/>
  <rect x="180" y="322" width="6" height="12" fill="rgba(255,255,255,0.9)"/>
  <text x="225" y="327" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">DATA</text>

  <!-- Label tag at top -->
  <rect x="145" y="22" width="110" height="24" rx="12" fill="rgba(243,112,30,0.12)" stroke="#f3701e" stroke-width="1" opacity="0.7"/>
  <text x="200" y="38" text-anchor="middle" font-family="monospace" font-size="10" fill="#f3701e" letter-spacing="1">RESEARCHER</text>
</svg>
