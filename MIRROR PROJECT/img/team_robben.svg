<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1824;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e05010;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f3701e;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#f3701e;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <!-- Subtle glow -->
  <ellipse cx="200" cy="160" rx="180" ry="160" fill="url(#glowGrad)"/>

  <!-- Grid lines (dev aesthetic) -->
  <g opacity="0.07" stroke="#f3701e" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Decorative corner brackets -->
  <g fill="none" stroke="#f3701e" stroke-width="2" opacity="0.5">
    <polyline points="20,40 20,20 40,20"/>
    <polyline points="360,40 360,20 380,20"/>
    <polyline points="20,360 20,380 40,380"/>
    <polyline points="360,360 360,380 380,380"/>
  </g>

  <!-- Body / figure base -->
  <ellipse cx="200" cy="380" rx="130" ry="50" fill="#12101a"/>

  <!-- Torso - hoodie/jacket shape -->
  <path d="M120 290 Q130 240 200 230 Q270 240 280 290 L290 370 L110 370 Z" fill="#1e1c2a"/>
  <!-- Jacket detail -->
  <path d="M165 250 L200 295 L235 250" fill="none" stroke="#2a2838" stroke-width="6"/>
  <line x1="200" y1="295" x2="200" y2="370" stroke="#2a2838" stroke-width="5"/>

  <!-- Neck -->
  <rect x="184" y="210" width="32" height="30" rx="8" fill="#c9a07a"/>

  <!-- Head -->
  <ellipse cx="200" cy="185" rx="58" ry="66" fill="#c9a07a"/>

  <!-- Hair (side-part, clean) -->
  <path d="M142 168 Q145 118 200 118 Q255 118 258 168 Q250 138 200 135 Q150 138 142 168Z" fill="#2c1f0e"/>
  <path d="M142 168 Q138 148 145 135 Q150 138 142 168Z" fill="#2c1f0e"/>

  <!-- Eyes -->
  <ellipse cx="178" cy="182" rx="9" ry="10" fill="#1a1612"/>
  <ellipse cx="222" cy="182" rx="9" ry="10" fill="#1a1612"/>
  <circle cx="181" cy="179" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="225" cy="179" r="3" fill="#fff" opacity="0.6"/>

  <!-- Eyebrows -->
  <path d="M165 168 Q178 163 191 168" fill="none" stroke="#2c1f0e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M209 168 Q222 163 235 168" fill="none" stroke="#2c1f0e" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M197 192 Q200 205 203 192" fill="none" stroke="#a07050" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M185 210 Q200 222 215 210" fill="none" stroke="#8a5a3a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Code bracket icon (role indicator) -->
  <rect x="162" y="304" width="76" height="36" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="200" y="327" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">&lt;/dev&gt;</text>

  <!-- Label tag at top -->
  <rect x="155" y="22" width="90" height="24" rx="12" fill="rgba(243,112,30,0.12)" stroke="#f3701e" stroke-width="1" opacity="0.7"/>
  <text x="200" y="38" text-anchor="middle" font-family="monospace" font-size="10" fill="#f3701e" letter-spacing="1">DEVELOPER</text>
</svg>
